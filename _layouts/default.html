<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="geo.region" content="US">
<meta name="geo.placename" content="United States">
<meta name="ICBM" content="38.8951,-77.0364">
<meta name="target_country" content="us">
<meta name="distribution" content="global">
<meta name="rating" content="general">
{% seo %}
<link rel="alternate" hreflang="en-us" href="{{ page.url | absolute_url }}">
<link rel="alternate" hreflang="x-default" href="{{ page.url | absolute_url }}">
<link rel="sitemap" type="application/xml" href="{{ '/sitemap.xml' | relative_url }}">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;max-width:780px;margin:0 auto;padding:20px;line-height:1.6;color:#222}
header{border-bottom:2px solid #1a73e8;padding-bottom:10px;margin-bottom:24px}
header a{color:#1a73e8;text-decoration:none;font-weight:700;font-size:1.4em}
nav{margin-top:8px}
nav a{margin-right:14px;color:#555;text-decoration:none;font-size:0.95em}
nav a:hover{color:#1a73e8}
h1,h2,h3{color:#1a73e8;line-height:1.3}
h1{font-size:1.7em}
h2{font-size:1.3em;margin-top:1.8em}
a{color:#1a73e8}
article{margin-bottom:2em}
.meta{color:#888;font-size:0.85em}
footer{border-top:1px solid #ddd;padding-top:14px;margin-top:40px;color:#888;font-size:0.85em;text-align:center}
.post-list{list-style:none;padding:0}
.post-list li{padding:10px 0;border-bottom:1px solid #eee}
</style>
<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"Organization",
  "name":"Android Apps Spot",
  "url":"{{ site.url }}{{ site.baseurl }}/",
  "areaServed":{"@type":"Country","name":"United States"},
  "audience":{"@type":"PeopleAudience","geographicArea":{"@type":"Country","name":"United States"}}
}
</script>
</head>
<body>
<header>
<a href="{{ '/' | relative_url }}">Android Apps Spot</a>
<nav>
<a href="{{ '/' | relative_url }}">Home</a>
<a href="{{ '/about/' | relative_url }}">About</a>
<a href="{{ '/contact/' | relative_url }}">Contact</a>
</nav>
</header>
<main>
{{ content }}
</main>
<footer>© {{ site.time | date: '%Y' }} Android Apps Spot · Independent app reviews for US Android users</footer>
</body>
</html>
